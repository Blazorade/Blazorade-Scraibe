<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{title}</title>
  <base href="/" />
  <!-- Page metadata -->
  <meta name="description" content="{description}" />
  <!-- Optional meta tags — omit the line entirely when the frontmatter field is absent -->
  <meta name="keywords" content="{keywords}" />
  <meta name="author" content="{author}" />
  <meta name="date" content="{date}" />
  <!-- Open Graph -->
  <meta property="og:title" content="{title}" />
  <meta property="og:description" content="{description}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://{HostName}/{slug}.html" />
  <!-- Canonical URL -->
  <link rel="canonical" href="https://{HostName}/{slug}.html" />
  <!-- Fonts and application styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" id="webassembly" />
  <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="{{WebAppName}}.styles.css" rel="stylesheet" />
  <script type="importmap"></script>
  <script src="js/blazorade-publisher.js"></script>
  <!-- Address bar cleanup: when this file is loaded directly as /{slug}.html, rewrite the
       browser URL to /{redirect_to} without an HTTP redirect. HttpClient in Blazor does not
       execute scripts, so the fetch of this file for content extraction is unaffected. -->
  <script>
    if (typeof window !== 'undefined' && window.location.pathname.endsWith('.html')) {
      history.replaceState(null, '', '{redirect_to}');
    }
  </script>
</head>
<body>
  <div id="app">
    <svg class="loading-progress">
      <circle r="40%" cx="50%" cy="50%" />
      <circle r="40%" cx="50%" cy="50%" />
    </svg>
    <div class="loading-progress-text"></div>
  </div>

  <div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
  </div>

  <!-- Static page content for crawlers and AI bots. The Blazor app fetches this file and
       extracts the <main> element to render at runtime. The hidden attribute keeps this
       invisible to browser users while remaining fully indexed by crawlers. -->
  <main hidden>
    <!-- AI-generated, well-structured semantic HTML content -->
    {body_html}
  </main>

  <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
