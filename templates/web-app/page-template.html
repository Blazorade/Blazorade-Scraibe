<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{title}</title>
  <base href="/" />
  <script type="importmap"></script>
  <!-- Page metadata -->
  <meta name="description" content="{description}" />
  <!-- Optional meta tags — omit the line entirely when the frontmatter field is absent -->
  <meta name="keywords" content="{keywords}" />
  <meta name="author" content="{author}" />
  <meta name="date" content="{date}" />
  <!-- Open Graph -->
  <meta property="og:title" content="{title}" />
  <meta property="og:description" content="{description}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://{HostName}/{cleanSlug}" />
  <!-- Canonical URL -->
  <link rel="canonical" href="https://{HostName}/{cleanSlug}" />
  <link rel="stylesheet" href="_content/{{ComponentLibraryName}}/css/app.css" />
</head>
<body>
{layout_html}
  <div aria-hidden="true">
    <div id="app">
      <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%" />
        <circle r="40%" cx="50%" cy="50%" />
      </svg>
      <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
      An unhandled error has occurred.
      <a href="." class="reload">Reload</a>
      <span class="dismiss">🗙</span>
    </div>
    <script src="{blazor_script}" autostart="false" defer></script>
  </div>
</body>
</html>
